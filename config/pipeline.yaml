pipeline:
  name: project_cloud_bi_platform
  description: "Pipeline batch para analítica de PRONABEC y presupuesto público usando Google Cloud y Power BI."
  environment: dev
  processing_mode: batch
  timezone: America/Lima

execution:
  default_schedule: "0 5 * * *"
  retries: 2
  retry_delay_minutes: 5
  timeout_minutes: 60

storage:
  bucket_env_var: GCS_BUCKET_NAME
  prefixes:
    landing: landing
    bronze: bronze
    silver: silver
    gold: gold
    dlq: dlq
    temp: temp
    staging: staging

gcs_paths:
  pronabec_bronze_raw: "bronze/pronabec/{dataset}/extraction_date={extraction_date}/data_raw.json"
  pronabec_bronze_normalized: "bronze/pronabec/{dataset}/extraction_date={extraction_date}/data.jsonl"
  mef_bronze: "bronze/mef/presupuesto/extraction_date={extraction_date}/data.csv"
  rejected_records: "dlq/{dataset}/extraction_date={extraction_date}/rejected_records.jsonl"
  pronabec_reports_bronze_csv: "bronze/pronabec_reports/{dataset}/extraction_date={extraction_date}/data.csv"
  inei_reports_bronze_csv: "bronze/inei_reports/{dataset}/extraction_date={extraction_date}/data.csv"
  pronabec_reports_source_document: "landing/pronabec_reports/{source_subset}/_documents/{document_file}"

pronabec_reports:
  local_manual_dir_env_var: PRONABEC_REPORTS_LOCAL_MANUAL_DIR
  local_manual_dir: data/manual/pronabec_reports
  landing_prefix_env_var: PRONABEC_REPORTS_LANDING_PREFIX
  landing_prefix: landing/pronabec_reports
  bronze_prefix_env_var: PRONABEC_REPORTS_BRONZE_PREFIX
  bronze_prefix: bronze/pronabec_reports
  subsets_env_var: PRONABEC_REPORTS_SUBSETS
  subsets:
    - pes_2025
    - beca18_universitarios_2012_2026

inei_reports:
  landing_prefix_env_var: INEI_REPORTS_LANDING_PREFIX
  landing_prefix: landing/inei_reports
  bronze_prefix_env_var: INEI_REPORTS_BRONZE_PREFIX
  bronze_prefix: bronze/inei_reports
  datasets:
    - name: inei_population_youth_region
      file_name: inei_population_youth_region.csv
    - name: inei_demographic_indicators_region
      file_name: inei_demographic_indicators_region.csv
    - name: inei_pobreza_departamental
      file_name: inei_pobreza_departamental_2012_2025.csv
    - name: inei_internet_acceso_region
      file_name: inei_internet_acceso_region_2012_2025_final.csv

bigquery:
  datasets:
    bronze: bronze
    silver: silver
    gold: gold
    audit: audit
    ml: ml

audit:
  pipeline_runs_table: audit.pipeline_runs
  extraction_runs_table: audit.extraction_runs
  data_quality_results_table: audit.data_quality_results

observability:
  structured_logging: true
  log_level_env_var: LOG_LEVEL
  monitoring_enabled: true

reporting:
  tool: Power BI
  consumption_layer: BigQuery Gold
