project:
  id: your-gcp-project-id
  name: your-gcp-project-id
  number: "000000000000"
  region: us-central1
  zone: us-central1-a
  environment: dev

locations:
  bigquery: US
  cloud_storage: US

service_accounts:
  cloud_run_jobs: your-cloudrun-sa@your-gcp-project-id.iam.gserviceaccount.com
  dataflow: pronabec-dataflow-sa@pronabec-cloud-bi-platform.iam.gserviceaccount.com
  composer: your-composer-sa@your-gcp-project-id.iam.gserviceaccount.com
  cicd: your-cicd-sa@your-gcp-project-id.iam.gserviceaccount.com

artifact_registry:
  location: us-central1
  repository: pronabec-containers
  image_name: pronabec-cloud-bi-platform
  image_tag: latest
  image_uri: us-central1-docker.pkg.dev/your-gcp-project-id/pronabec-containers/pronabec-cloud-bi-platform:latest

cloud_run_jobs:
  region: us-central1
  image: us-central1-docker.pkg.dev/your-gcp-project-id/pronabec-containers/pronabec-cloud-bi-platform:latest
  service_account: your-cloudrun-sa@your-gcp-project-id.iam.gserviceaccount.com
  jobs:
    pronabec_extract:
      name: pronabec-extract-job
      command:
        - -m
        - pipelines.extract_pronabec
    pronabec_discovery:
      name: pronabec-discovery-job
      command:
        - -m
        - pipelines.discover_pronabec
    pronabec_build_plan:
      name: pronabec-build-plan-job
      command:
        - -m
        - pipelines.build_pronabec_extraction_plan
    pronabec_run_plan:
      name: pronabec-run-plan-job
      command:
        - -m
        - pipelines.run_pronabec_extraction_plan
    pronabec_extract_chunk:
      name: pronabec-extract-chunk-job
      command:
        - -m
        - pipelines.extract_pronabec
    pronabec_finalize_dataset:
      name: pronabec-finalize-dataset-job
      command:
        - -m
        - pipelines.finalize_pronabec_dataset
    pronabec_reports_stage:
      name: pronabec-stage-reports-job
      command:
        - -m
        - tools.stage_pronabec_manual_reports
        - --strict
        - --overwrite
    mef_extract:
      name: mef-extract-job
      command:
        - -m
        - pipelines.scrape_mef_budget
      env:
        MEF_SOURCE_MODE: consulta_amigable
        MEF_CONSULTA_AMIGABLE_BASE_URL: https://apps5.mineco.gob.pe/transparencia/Navegador/
        MEF_START_YEAR: "2012"
        MEF_END_YEAR: "2026"
        MEF_TEXT_FILTER: PRONABEC
        MEF_TIMEOUT_SECONDS: "90"
        MEF_PRONABEC_EXECUTORA_CODE: 117-1438
        MEF_PRONABEC_EXECUTORA_NAME: PROGRAMA NACIONAL DE BECAS Y CREDITO EDUCATIVO
        MEF_INCLUDE_HIERARCHY: "true"
        MEF_INCLUDE_SPENDING_BREAKDOWNS: "true"
        MEF_BREAKDOWN_SLICES: producto,generica,fuente,rubro,departamento,temporal,producto_temporal,actividad,actividad_temporal,generica_temporal
    gold_publish:
      name: gold-publish-job
      command:
        - -m
        - pipelines.publish_gold_views
    gold_validate:
      name: gold-validate-job
      command:
        - -m
        - pipelines.validate_gold
    quality_checks:
      name: quality-checks-job
      command:
        - -m
        - pipelines.quality_checks

cloud_storage:
  bucket_name: your-gcs-bucket-name
  location: US
  storage_class: STANDARD
  uniform_bucket_level_access: true
  prefixes:
    bronze: bronze
    dlq: dlq
    quality: quality
    audit: audit
    evidence: evidence
    dataflow_temp: dataflow/temp
    dataflow_staging: dataflow/staging
  locations:
    dlq: gs://your-gcs-bucket-name/dlq
    quality: gs://your-gcs-bucket-name/quality
    audit: gs://your-gcs-bucket-name/audit
    evidence: gs://your-gcs-bucket-name/evidence
    dataflow_temp: gs://your-gcs-bucket-name/dataflow/temp
    dataflow_staging: gs://your-gcs-bucket-name/dataflow/staging

bigquery:
  location: US
  datasets:
    bronze:
      name: bronze
      description: Dataset para tablas externas o staging raw.
    silver:
      name: silver
      description: Dataset para tablas limpias, normalizadas y validadas.
    gold:
      name: gold
      description: Dataset para vistas y marts analíticos.
    audit:
      name: audit
      description: Dataset para auditoría de ejecuciones, resultados de calidad y métricas operativas.
    ml:
      name: ml
      description: Dataset reservado para modelos y predicciones analíticas.

dataflow:
  runner: DataflowRunner
  region: us-central1
  temp_location: gs://your-gcs-bucket-name/dataflow/temp
  staging_location: gs://your-gcs-bucket-name/dataflow/staging
  max_num_workers: 2
  worker_machine_type: n1-standard-2
  service_account: pronabec-dataflow-sa@pronabec-cloud-bi-platform.iam.gserviceaccount.com

composer:
  environment_name: project-cloud-bi-composer
  location: us-central1
  service_account: your-composer-sa@your-gcp-project-id.iam.gserviceaccount.com

quality:
  checks_file: sql/quality/data_quality_checks.sql
  location: gs://your-gcs-bucket-name/quality
  fail_on_error: true
  dry_run: false

logging:
  structured_logging: true
  level: INFO

monitoring:
  recommended_metrics:
    - pipeline_status
    - records_read
    - records_valid
    - records_rejected
    - rejection_rate
    - dataflow_job_status
    - quality_check_status
