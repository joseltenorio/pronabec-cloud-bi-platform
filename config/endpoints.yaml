pronabec:
  base_url: "https://datosabiertos.pronabec.gob.pe/Dataset"

  endpoints:
    - name: perdida_becas
      path: PerdidaDeBecas
      description: "Becarios que perdieron la beca."
      enabled: true
      expected_columns:
        - nro_fila
        - convocatoria
        - region
        - motivo_perdida
        - tipo_resolucion
        - fecha_resolucion
        - fecha_postulacion
        - tipo_ie
        - insti_educ
        - sede
        - carrera
        - sexo
        - fecha_carga

    - name: notas_becarios
      path: NotasDeBecarios
      description: "Notas promedio de becarios por semestre académico."
      enabled: true
      expected_columns:
        - nro_fila
        - codigo_becario
        - semestre
        - ciclo
        - nota_promedio
        - fecha_carga

    - name: concepto_pago
      path: ConceptoDePago
      description: "Conceptos y subconceptos de pago asociados a subvenciones."
      enabled: true
      expected_columns:
        - nro_fila
        - tipo_subvencion
        - concepto
        - categoria
        - modalidad
        - estado
        - aplica_descuento
        - fecha_carga

    - name: convocatorias
      path: Convocatorias
      description: "Convocatorias, programas, modalidades, vacantes y fechas del proceso."
      enabled: true
      expected_columns:
        - nro_fila
        - id_convocatoria
        - codigo_anual
        - description_conv
        - modalidad
        - programa
        - vacantes
        - etapas
        - fecha_fin_convocatoria
        - fecha_inicio_postulacion
        - fecha_fin_postulacion
        - fecha_inicio_evaluacion
        - fecha_fin_evaluacion
        - fecha_inicio_vigencia
        - fecha_fin_vigencia
        - edad_minima
        - edad_maxima
        - resolucion
        - fecha_carga

    - name: becarios_provincia
      path: Beca18BecariosPorProvincia
      description: "Distribución de becarios por departamento, provincia y tipo de beca."
      enabled: true
      expected_columns:
        - nro_fila
        - region
        - provincia
        - b18_n
        - b18_pct
        - permanencia_n
        - permanencia_pct
        - bicentenario_n
        - bicentenario_pct
        - especial_n
        - especial_pct
        - ffaa_n
        - ffaa_pct
        - vraem_n
        - vraem_pct
        - repec_n
        - repec_pct
        - internacional_n
        - internacional_pct
        - otros_n
        - otros_pct
        - fecha_carga

    - name: ubigeo_postulacion
      path: UbigeoDePostulacionABecas
      description: "Ubicación geográfica de postulantes a becas."
      enabled: true
      expected_columns:
        - nro_fila
        - codigo_ubigeo
        - region
        - provincia
        - distrito
        - fecha_carga

    - name: periodos_academicos
      path: PeriodosAcademicosDeBecarios
      description: "Periodos académicos asociados a becarios."
      enabled: true
      expected_columns:
        - nro_fila
        - anio
        - mes_numero
        - periodo_completo
        - mes_nombre
        - fecha_carga

    - name: colegios_habiles
      path: ColegiosHabiles
      description: "Instituciones educativas hábiles registradas en el portal de Datos Abiertos de PRONABEC."
      enabled: true
      expected_columns:
        - nro_fila
        - ugel
        - institucion_educativa
        - tipo_gestion
        - nivel_modalidad
        - forma_atencion
        - centro_poblado
        - distrito
        - direccion
        - telefono
        - fecha_carga

    - name: becarios_pais_estudio
      path: BecariosPorPaisDeEstudio
      description: "Becarios registrados por país de estudio, modalidad, convocatoria, tipo de institución, institución y sexo."
      enabled: true
      expected_columns:
        - nro_fila
        - modalidad
        - convocatoria
        - pais_estudio
        - tipo_institucion
        - institucion
        - sexo
        - fecha_carga

    - name: convocatorias_carrera_sede
      path: ConvocatoriaPorCarreraSede
      description: "Convocatorias por carrera, sede, institución educativa y datos administrativos de oferta académica."
      enabled: true
      expected_columns:
        - nro_fila
        - id_convocatoria
        - convocatoria
        - pais_origen
        - nivel_educativo
        - tipo_institucion
        - sede
        - institucion
        - carrera
        - resolucion
        - gestion
        - abreviatura
        - region
        - web
        - representante
        - telefono
        - ruc
        - email
        - fecha_carga

    - name: nota_postulante_region
      path: NotaPromedioDelPostulantePorRegion
      description: "Nota promedio de postulantes por región, modalidad, año de convocatoria, tipo de institución, institución educativa y semestre."
      enabled: true
      expected_columns:
        - nro_fila
        - region
        - nota_promedio
        - modalidad
        - anio_convocatoria
        - tipo_institucion
        - institucion_educativa
        - semestre
        - fecha_carga

mef:
  source_name: "MEF Consulta Amigable"
  description: "Información presupuestal pública relacionada con PRONABEC."
  enabled: true
  start_year_env_var: MEF_START_YEAR
  end_year_env_var: MEF_END_YEAR
  expected_columns:
    - ano
    - ejecutora_codigo
    - ejecutora_nombre
    - pia
    - pim
    - certificacion
    - compromiso_anual
    - compromiso_mensual
    - devengado
    - girado
    - avance_porcentaje

