dag:
  id: pronabec_medallion_batch
  schedule: "0 5 * * 6"
  timezone: America/Lima
  max_active_runs: 1
  retries: 2
  retry_delay_minutes: 5

runtime:
  project_id_var: gcp_project_id
  region_var: gcp_region
  bucket_name_var: gcs_bucket_name
  bronze_dataset_var: bq_bronze_dataset
  silver_dataset_var: bq_silver_dataset
  gold_dataset_var: bq_gold_dataset
  audit_dataset_var: bq_audit_dataset
  dataflow_sdk_container_image_var: dataflow_sdk_container_image

jobs:
  pronabec_discovery_job_name_var: pronabec_discovery_job_name
  pronabec_build_plan_job_name_var: pronabec_build_plan_job_name
  pronabec_run_plan_job_name_var: pronabec_run_plan_job_name
  pronabec_finalize_dataset_job_name_var: pronabec_finalize_dataset_job_name
  mef_extract_job_name_var: mef_extract_job_name
  pronabec_reports_stage_job_name_var: pronabec_reports_stage_job_name
  pronabec_reports_dataflow_job_name_var: dataflow_pronabec_report_job_name
  inei_reports_stage_job_name_var: inei_reports_stage_job_name
  inei_reports_dataflow_job_name_var: dataflow_inei_report_job_name
  minedu_escale_extract_job_name_var: minedu_escale_extract_job_name
  minedu_escale_dataflow_job_name_var: dataflow_minedu_escale_job_name
  bronze_manifest_validation_job_name_var: bronze_manifest_validation_job_name
  gold_publish_job_name_var: gold_publish_job_name
  gold_validate_job_name_var: gold_validate_job_name
  quality_checks_job_name_var: quality_checks_job_name

datasets:
  pronabec_api:
    enabled: true
    source_system: pronabec
    bronze_path_template: "bronze/pronabec/{dataset}/extraction_date={extraction_date}/data.jsonl"
    silver_table_template: "{project_id}:{silver_dataset}.pronabec_{dataset}"
    discovery:
      page_size_validation_mode: full_pages
      page_size_candidates: [5000, 3000, 2000, 1000, 500, 100]
      max_validation_pages: 1000
      stop_on_first_stable_page_size: true
    extraction_policies:
      - source_dataset: perdida_becas
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: false
        extraction_mode: single
        required_for_e2e: false
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 500
        fallback_page_sizes: [100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
      - source_dataset: notas_becarios
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: false
        extraction_mode: single
        required_for_e2e: false
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 10000
        fallback_page_sizes: [5000, 2000, 1000, 500, 100]
        max_page_size_tested_ok: 20000
        page_size_policy: dataset_safe_default
      - source_dataset: concepto_pago
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: false
        extraction_mode: single
        required_for_e2e: false
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 1000
        fallback_page_sizes: [500, 100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
      - source_dataset: convocatorias
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: true
        extraction_mode: single
        required_for_e2e: true
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 1000
        fallback_page_sizes: [500, 100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
      - source_dataset: becarios_provincia
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: true
        extraction_mode: single
        required_for_e2e: true
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 500
        fallback_page_sizes: [100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
        allow_record_count_mismatch: true
      - source_dataset: ubigeo_postulacion
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: true
        extraction_mode: single
        required_for_e2e: true
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 2000
        fallback_page_sizes: [1000, 500, 100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
      - source_dataset: periodos_academicos
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: false
        extraction_mode: single
        required_for_e2e: false
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 500
        fallback_page_sizes: [100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
      - source_dataset: colegios_habiles
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: true
        extraction_mode: single
        required_for_e2e: true
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 5000
        fallback_page_sizes: [2000, 1000, 500, 100]
        max_page_size_tested_ok: 5000
        page_size_policy: dataset_safe_default
      - source_dataset: becarios_pais_estudio
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: true
        extraction_mode: single
        required_for_e2e: true
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 10000
        fallback_page_sizes: [5000, 2000, 1000, 500, 100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
      - source_dataset: convocatorias_carrera_sede
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: false
        extraction_mode: chunked
        required_for_e2e: false
        chunk_size_pages: 10
        max_parallel_chunks: 2
        recommended_page_size: 5000
        fallback_page_sizes: [2000, 1000, 500, 100]
        max_page_size_tested_ok: 5000
        page_size_policy: dataset_safe_default
      - source_dataset: nota_postulante_region
        extraction_enabled: true
        bronze_enabled: true
        silver_enabled: false
        extraction_mode: single
        required_for_e2e: false
        chunk_size_pages: null
        max_parallel_chunks: 1
        recommended_page_size: 500
        fallback_page_sizes: [100]
        max_page_size_tested_ok: 10000
        page_size_policy: dataset_safe_default
    items:
      - source_dataset: convocatorias
        job_name: dataflow-pronabec-convocatorias-job
        job_name_var: dataflow_pronabec_convocatorias_job_name
      - source_dataset: ubigeo_postulacion
        job_name: dataflow-pronabec-ubigeo-postulacion-job
        job_name_var: dataflow_pronabec_ubigeo_postulacion_job_name
      - source_dataset: becarios_pais_estudio
        job_name: dataflow-pronabec-becarios-pais-estudio-job
        job_name_var: dataflow_pronabec_becarios_pais_estudio_job_name
      - source_dataset: colegios_habiles
        job_name: dataflow-pronabec-colegios-habiles-job
        job_name_var: dataflow_pronabec_colegios_habiles_job_name
      - source_dataset: becarios_provincia
        job_name: dataflow-pronabec-becarios-provincia-job
        job_name_var: dataflow_pronabec_becarios_provincia_job_name

  mef:
    enabled: true
    source_system: mef
    bronze_path_template: "bronze/mef/{dataset}/extraction_date={extraction_date}/year=*/data.csv"
    silver_table_template: "{project_id}:{silver_dataset}.{silver_table}"
    items:
      - source_dataset: presupuesto
        job_name: dataflow-mef-presupuesto-job
        silver_table: presupuesto_mef
        job_name_var: dataflow_mef_presupuesto_job_name
      - source_dataset: presupuesto_temporal
        job_name: dataflow-mef-presupuesto-temporal-job
        silver_table: presupuesto_mef_temporal
        job_name_var: dataflow_mef_presupuesto_temporal_job_name
      - source_dataset: presupuesto_producto
        job_name: dataflow-mef-producto-job
        silver_table: presupuesto_mef_producto
        job_name_var: dataflow_mef_producto_job_name
      - source_dataset: presupuesto_producto_temporal
        job_name: dataflow-mef-producto-temporal-job
        silver_table: presupuesto_mef_producto_temporal
        job_name_var: dataflow_mef_producto_temporal_job_name
      - source_dataset: presupuesto_actividad
        job_name: dataflow-mef-actividad-job
        silver_table: presupuesto_mef_actividad
        job_name_var: dataflow_mef_actividad_job_name
      - source_dataset: presupuesto_actividad_temporal
        job_name: dataflow-mef-actividad-temporal-job
        silver_table: presupuesto_mef_actividad_temporal
        job_name_var: dataflow_mef_actividad_temporal_job_name
      - source_dataset: presupuesto_generica
        job_name: dataflow-mef-generica-job
        silver_table: presupuesto_mef_generica
        job_name_var: dataflow_mef_generica_job_name
      - source_dataset: presupuesto_generica_temporal
        job_name: dataflow-mef-generica-temporal-job
        silver_table: presupuesto_mef_generica_temporal
        job_name_var: dataflow_mef_generica_temporal_job_name
      - source_dataset: presupuesto_hierarchy
        job_name: dataflow-mef-hierarchy-job
        silver_table: presupuesto_mef_hierarchy
        job_name_var: dataflow_mef_hierarchy_job_name

  pronabec_reports:
    enabled: true
    source_system: pronabec_reports
    landing_path_template: "landing/pronabec_reports/{source_subset}"
    landing_documents_path_template: "landing/pronabec_reports/{source_subset}/_documents"
    bronze_base_path: "bronze/pronabec_reports"
    bronze_path_template: "bronze/pronabec_reports/{dataset}/extraction_date={extraction_date}/data.csv"
    silver_table_template: "{project_id}:{silver_dataset}.pronabec_{dataset}"
    staging_job_name_var: pronabec_reports_stage_job_name
    dataflow_job_name_var: dataflow_pronabec_report_job_name
    items_from: "config/endpoints.yaml::pronabec_reports.documents[*]"

  inei_reports:
    enabled: true
    source_system: inei_reports
    landing_path_template: "landing/inei_reports"
    bronze_base_path: "bronze/inei_reports"
    bronze_path_template: "bronze/inei_reports/{dataset}/extraction_date={extraction_date}/data.csv"
    silver_table_template: "{project_id}:{silver_dataset}.{dataset}"
    staging_job_name_var: inei_reports_stage_job_name
    dataflow_job_name_var: dataflow_inei_report_job_name
    items:
      - source_dataset: inei_population_youth_region
      - source_dataset: inei_demographic_indicators_region
      - source_dataset: inei_pobreza_departamental
      - source_dataset: inei_internet_acceso_region

  minedu_escale:
    enabled: true
    source_system: minedu_escale
    bronze_path_template: "bronze/minedu/escale_matricula_secundaria/extraction_date={extraction_date}/data.csv"
    silver_table_template: "{project_id}:{silver_dataset}.minedu_matricula_secundaria_departamental"
    extract_job_name_var: minedu_escale_extract_job_name
    dataflow_job_name_var: dataflow_minedu_escale_job_name
    items:
      - source_dataset: minedu_matricula_secundaria_departamental
        job_name: dataflow-minedu-escale-job
        job_name_var: dataflow_minedu_escale_job_name

gold:
  enabled: true
  mode: views
  sql_template: "sql/ddl/create_gold_views.sql"
  execution_job_name_var: gold_publish_job_name
  validation_job_name_var: gold_validate_job_name
  validation_queries:
    - name: vw_pronabec_resumen_ejecutivo
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_pronabec_resumen_ejecutivo`"
    - name: vw_beca18_becas_otorgadas_anual
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_becas_otorgadas_anual`"
    - name: vw_beca18_cobertura_territorial_2016
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_cobertura_territorial_2016`"
    - name: vw_beca18_universitarios_carrera_anual
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_universitarios_carrera_anual`"
    - name: vw_beca18_universitarios_universidad_anual
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_universitarios_universidad_anual`"
    - name: vw_beca18_perfil_social_indicadores
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_perfil_social_indicadores`"
    - name: vw_beca18_region_postulacion
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_region_postulacion`"
    - name: vw_beca18_migracion_region
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_migracion_region`"
    - name: vw_beca18_trayectoria_eleccion
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_beca18_trayectoria_eleccion`"
    - name: vw_mef_presupuesto_ejecucion_anual
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_mef_presupuesto_ejecucion_anual`"
    - name: vw_mef_presupuesto_ejecucion_temporal
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_mef_presupuesto_ejecucion_temporal`"
    - name: vw_mef_presupuesto_producto
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_mef_presupuesto_producto`"
    - name: vw_mef_presupuesto_actividad
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_mef_presupuesto_actividad`"
    - name: vw_mef_presupuesto_generica
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_mef_presupuesto_generica`"
    - name: vw_pronabec_becas_vs_presupuesto_anual
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_pronabec_becas_vs_presupuesto_anual`"
    - name: vw_pronabec_beca18_resumen_analitico
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_pronabec_beca18_resumen_analitico`"
    - name: vw_predictive_region_priority_scores
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_predictive_region_priority_scores`"
    - name: vw_predictive_region_priority_scores_v2
      query: "SELECT COUNT(*) AS rows_count FROM `{project_id}.{gold_dataset}.vw_predictive_region_priority_scores_v2`"
